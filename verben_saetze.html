<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<title>Lückentext Trainer</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				font-size: 2.5rem;
			}
			input {
				width: 180px;
				margin: 0 5px;
				font-size: 1em; /* gleiche Größe wie Text */
				color: black; /* Eingabetext bleibt schwarz */
			}
			.correct-text {
				color: green;
			}
			.wrong-text {
				color: red;
			}
			.translation {
				display: none;
				margin-top: 4px;
				color: #555;
			}
			button {
				cursor: pointer;
				font-size: 2.5rem;
			}
			#btnPruef {
				margin-left: 15rem;
				padding: 1rem;
			}
			.verb-hint {
				color: #888;
				font-size: 0.9em;
				margin-left: 4px;
			}
		</style>
	</head>
	<body>
		<div id="exercise"></div>
		<button id="btnPruef" onclick="checkAnswers()">Prüfen</button>

		<script>
			const grammarData = [
				{
					sentences: [
						{
							verb: "être",
							fr: "Nous #sommes# de Strasbourg.",
							de: "Wir kommen aus Straßburg.",
						},
						{
							verb: "être",
							fr: "Je #suis# d'Aix-la-Chapelle.",
							de: "Ich komme aus Aachen.",
						},
						{
							verb: "être",
							fr: "Elle #est# allemande.",
							de: "Sie ist Deutsche.",
						},
					],
				},
				{
					sentences: [
						{ verb: "avoir", fr: "Il #a# 30 ans.", de: "Er ist 30 Jahre alt." },
						{ verb: "avoir", fr: "Tu #as# faim.", de: "Du hast Hunger." },
						{
							verb: "avoir",
							fr: "J'#ai# trouvé quelque chose.",
							de: "Ich habe etwas gefunden.",
						},
					],
				},
				{
					sentences: [
						{
							verb: "faire",
							fr: "Il #fait# froid aujourd'hui.",
							de: "Es ist kalt heute.",
						},
						{
							verb: "faire",
							fr: "Qu'est.ce que tu #fais# ce week-end ?",
							de: "Was machst du am Wochenende?",
						},
						{
							verb: "faire",
							fr: "Je #fais# mes devoirs.",
							de: "Ich mache meine Hausaufgaben.",
						},
					],
				},
			];

			// Fisher-Yates Shuffle
			function shuffle(array) {
				for (let i = array.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[array[i], array[j]] = [array[j], array[i]];
				}
				return array;
			}

			function createExercise() {
				const container = document.getElementById("exercise");
				container.innerHTML = "";

				let allSentences = [];

				grammarData.forEach((group) => {
					group.sentences.forEach((sentence) => {
						allSentences.push(sentence);
					});
				});

				shuffle(allSentences);

				// Nur 6 zufällige Sätze auswählen
				allSentences = allSentences.slice(0, 6);

				allSentences.forEach((sentence, index) => {
					const solution = sentence.fr.match(/#(.*?)#/)[1];
					const textWithGap = sentence.fr.replace(
						/#(.*?)#/,
						`<input type="text" 
  					data-solution="${solution}" 
  					data-index="${index}">
						<span class="verb-hint">(${sentence.verb})</span>`,
					);

					const p = document.createElement("p");
					p.innerHTML = `
            <div>
              ${textWithGap}
              <button onclick="showTranslation(${index})">🇩🇪</button>
            </div>
            <div class="translation" id="trans-${index}">
              ${sentence.de}
            </div>
          `;

					container.appendChild(p);
				});
			}

			function checkAnswers() {
				const inputs = document.querySelectorAll("input");

				inputs.forEach((input) => {
					const solution = input.dataset.solution.toLowerCase().trim();
					const userAnswer = input.value.toLowerCase().trim();

					input.classList.remove("correct-text", "wrong-text");

					if (userAnswer === "") {
						return; // leere Felder nicht prüfen
					}

					if (userAnswer === solution) {
						input.classList.add("correct-text");
					} else {
						input.classList.add("wrong-text");
					}
				});
			}

			function showTranslation(index) {
				const input = document.querySelector(`input[data-index="${index}"]`);
				const solution = input.dataset.solution.toLowerCase().trim();
				const userAnswer = input.value.toLowerCase().trim();
				const translation = document.getElementById("trans-" + index);

				// Übersetzung nur zeigen, wenn die Eingabe korrekt ist
				if (userAnswer === solution) {
					translation.style.display = "block";
				}
			}

			createExercise();
		</script>
	</body>
</html>
